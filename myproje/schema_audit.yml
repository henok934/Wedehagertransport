components:
  schemas:
    About:
      type: object
      properties:
        buschanges_count:
          type: integer
          description: The total number of bus changes available.
      required:
      - buschanges_count
    ActivateRequest:
      type: object
      properties:
        date:
          type: string
          format: date
          description: The date to check for active routes (YYYY-MM-DD)
      required:
      - date
    ActivateResponse:
      type: object
      properties:
        routes:
          type: array
          items:
            $ref: '#/components/schemas/RouteDisplay'
        buses_count:
          type: integer
      required:
      - buses_count
      - routes
    ActivateStatusUpdate:
      type: object
      properties:
        depcity:
          type: string
        descity:
          type: string
        date:
          type: string
          description: YYYY-MM-DD
        kilometer:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        plate_no:
          type: string
        is_active:
          type: boolean
          description: Set to true to activate
      required:
      - date
      - depcity
      - descity
      - is_active
      - kilometer
      - plate_no
      - price
    Admin:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        phone:
          type: string
          nullable: true
          maxLength: 50
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
      required:
      - username
    AdminDeleteRequest:
      type: object
      properties:
        first_name:
          type: string
          description: First Name of the admin
        last_name:
          type: string
          description: Last Name of the admin
        username:
          type: string
          description: Username of the admin
        phone:
          type: string
          description: Phone number of the admin
      required:
      - first_name
      - last_name
      - phone
      - username
    AvailableRoute:
      type: object
      properties:
        id:
          type: integer
        depcity:
          type: string
        descity:
          type: string
        date:
          type: string
          format: date
        plate_no:
          type: string
        side_no:
          type: string
      required:
      - date
      - depcity
      - descity
      - id
      - plate_no
      - side_no
    AwashAuth:
      type: object
      properties:
        account:
          type: string
          description: 13-digit account number
          maxLength: 13
          minLength: 13
        password:
          type: string
          writeOnly: true
        price:
          type: number
          format: double
          description: Amount to be paid
      required:
      - account
      - password
      - price
    AwashInput:
      type: object
      properties:
        account:
          type: string
          description: 13-digit Awash account number starting with 1000
          maxLength: 13
          minLength: 13
        price:
          type: number
          format: double
          description: The total amount to be paid
      required:
      - account
      - price
    BalanceSearch:
      type: object
      properties:
        date:
          type: array
          items:
            type: string
            format: date
          description: List of dates (e.g. ['2026-01-19'])
      required:
      - date
    BoaAuth:
      type: object
      properties:
        account:
          type: string
          maxLength: 8
          minLength: 8
        password:
          type: string
          writeOnly: true
        price:
          type: number
          format: double
      required:
      - account
      - password
      - price
    BoaInput:
      type: object
      properties:
        account:
          type: string
          description: 8-digit account number starting with 48
          maxLength: 8
          minLength: 8
        price:
          type: number
          format: double
          description: The payment amount
      required:
      - account
      - price
    BookRequest:
      type: object
      properties:
        depcity:
          type: string
          description: Departure City
        descity:
          type: string
          description: Destination City
        date:
          type: string
          description: Travel Date (YYYY-MM-DD)
      required:
      - date
      - depcity
      - descity
    BookResponse:
      type: object
      properties:
        routes:
          type: array
          items:
            type: object
            additionalProperties: {}
        levels:
          type: string
        buschanges_count:
          type: integer
      required:
      - buschanges_count
      - routes
    BooksSearchRequest:
      type: object
      properties:
        depcity:
          type: string
          description: Departure City
        descity:
          type: string
          description: Destination City
        date:
          type: string
          description: Travel Date (YYYY-MM-DD)
      required:
      - date
      - depcity
      - descity
    Bus:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        registration_id:
          type: string
          format: uuid
          readOnly: true
        registered_time:
          type: string
          format: date-time
          readOnly: true
        firstname:
          type: string
          nullable: true
          maxLength: 100
        lastname:
          type: string
          nullable: true
          maxLength: 100
        phone:
          type: string
          nullable: true
          maxLength: 20
        name:
          type: string
          nullable: true
          maxLength: 50
        plate_no:
          type: string
          maxLength: 50
        sideno:
          type: string
          maxLength: 50
        no_seats:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        level:
          type: string
          maxLength: 50
        owner_sc:
          type: integer
          nullable: true
      required:
      - id
      - plate_no
      - registered_time
      - registration_id
      - sideno
    BusChangeInput:
      type: object
