<script>
    const side = "{{ side }}".trim(); // Example values: "3" or "37/38" or "344"
    const sidenoInput = document.getElementById('sideno');
    const errorMessage = document.getElementById('error-message');

    function validateInput() {
        const value = sidenoInput.value;
        const validStarts = side.split('/').map(part => part.trim());
        
        // --- 1. SET THE TARGET LENGTH ---
        let targetLength = 0;
        if (side === "3") {
            targetLength = 3; // Rule: Side "3" requires 3 digits
        } else if (side.includes('/')) {
            targetLength = 4; // Rule: Multi-prefixes like "37/38" require 4 digits
        } else {
            targetLength = side.length; // Rule: Default to length of the string provided
        }

        sidenoInput.maxLength = targetLength;

        // --- 2. VALIDATION LOGIC ---
        if (value.length === 0) {
            errorMessage.style.display = 'none';
            return;
        }

        // Check if input starts with a valid prefix (if multi-prefix)
        const isValidStart = validStarts.some(s => value.startsWith(s));

        if (!isValidStart && side !== "3") {
             errorMessage.textContent = `Must start with ${validStarts.join(' or ')}.`;
             errorMessage.style.display = 'block';
        } else if (value.length !== targetLength) {
            // ERROR: Not equal to target length
            errorMessage.textContent = `Input must be exactly ${targetLength} digits.`;
            errorMessage.style.display = 'block';
        } else {
            errorMessage.style.display = 'none'; // Valid!
        }
    }

    // Final check for the "Submit" button
    document.querySelector('form').addEventListener('submit', function(event) {
        validateInput();
        if (errorMessage.style.display === 'block' || sidenoInput.value === "") {
            event.preventDefault();
        }
    });
</script>

}

const sideRule = "{{ side }}".trim();
const sidenoInput = document.getElementById('sideno');
const sideError = document.getElementById('side-error');

function validateSideInput() {
    const value = sidenoInput.value;
    const validStarts = sideRule.split('/').map(part => part.trim());
    let targetLength = (sideRule === "3") ? 3 : (sideRule.includes('/') ? 4 : sideRule.length);
    
    sidenoInput.maxLength = targetLength;

    if (value.length === 0) {
        sideError.style.display = 'none';
        return true;
    }

    const isValidStart = validStarts.some(s => value.startsWith(s));
    
    if (!isValidStart && sideRule !== "3") {
        sideError.textContent = `Start with ${validStarts.join(' or ')}`;
        sideError.style.display = 'block';
        return false;
    } else if (value.length !== targetLength) {
        sideError.textContent = `Must be ${targetLength} digits`;
        sideError.style.display = 'block';
        return false;
    } else {
        sideError.style.display = 'none';
        return true;
    }
}

document.getElementById('search_form_1').onsubmit = function(e) {
    if (!validateSideInput()) {
        e.preventDefault();
        alert("Please correct the Side Number errors.");
    }
};
