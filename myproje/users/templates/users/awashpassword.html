<!DOCTYPE html>
<html lang="en">
<head>
    <title>Authorize Payment | Awash Bank</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/styles/bootstrap4/bootstrap.min.css">

    <style>
        :root { --brand-navy: #00264d; --brand-gold: #ffcc00; --brand-dark: #0f172a; --awash-blue: #003DA5; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; }
        
        .top-bar { background: var(--brand-dark); color: white; padding: 8px 0; font-size: 12px; }
        .navbar-main { background: #fff; padding: 10px 0; border-bottom: 4px solid var(--awash-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .brand-logo { height: 40px; border-radius: 6px; margin-right: 10px; }
        .brand-text { font-weight: 800; color: var(--brand-navy); font-size: 20px; display: block; line-height: 1; }
        .brand-tagline { font-weight: 700; color: var(--awash-blue); font-size: 8px; letter-spacing: 1px; }

        .error-alert-box { background: #fee2e2; border: 1px solid #ef4444; color: #b91c1c; padding: 12px 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        .pin-widget { max-width: 380px; margin: 50px auto; background: #fff; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #edf2f7; overflow: hidden; }
        .widget-body { padding: 35px; text-align: center; }

        .pin-field { height: 60px; border-radius: 12px; font-size: 28px; font-weight: 800; text-align: center; letter-spacing: 10px; border: 2px solid #e2e8f0; color: var(--awash-blue); transition: 0.3s; }
        .pin-field:focus { border-color: var(--awash-blue); outline: none; box-shadow: 0 0 0 4px rgba(0, 61, 165, 0.1); }
        
        .btn-verify { background: var(--awash-blue); color: #fff; height: 55px; border-radius: 12px; font-weight: 800; border: none; width: 100%; margin-top: 20px; text-transform: uppercase; }
        .footer-main { background: var(--brand-navy); color: white; padding: 50px 0; text-align: center; }
    </style>
</head>
<body>
<div class="top-bar">

    <div class="container d-flex justify-content-between align-items-center">

        <span><i class="fas fa-bus mr-1"></i> National Transport</span>

        <a href="{% url 'login' %}"><i class="fas fa-lock mr-1"></i> STAFF LOGIN</a>

    </div>

</div>



<nav class="navbar navbar-expand-lg navbar-light navbar-main">

    <div class="container">

        <a href="{% url 'home' %}" class="d-flex align-items-center text-decoration-none">

            <img src="../static/images/photo_2026-01-31_09-14-55.jpg" class="brand-logo" alt="Logo">

            <div><span class="brand-text">Wedehager</span><span class="brand-tagline">TRANSPORT TECHNOLOGY</span></div>

        </a>



        <button class="navbar-toggler border-0" type="button" data-toggle="collapse" data-target="#mainMenu">

            <span class="navbar-toggler-icon"></span>

        </button>



        <div class="collapse navbar-collapse" id="mainMenu">

            <ul class="navbar-nav ml-auto align-items-lg-center mt-3 mt-lg-0">

                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>

                <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>

                <li class="nav-item"><a class="nav-link" href="{% url 'get_ticket' %}">My Ticket</a></li>

                <li class="nav-item"><a class="nav-link" href="{% url 'comment' %}">Feedback</a></li>

                <li class="nav-item mt-2 mt-lg-0"><a class="nav-link btn-book-nav shadow-sm" href="{% url 'book' %}">BOOK NOW</a></li>

            </ul>

        </div>

    </div>

</nav>




<div class="container px-3">
    <div class="pin-widget">
        <div class="widget-body">
            <img src="../static/images/Awash.png" height="50" class="mb-4">
            
            {% if error %}
            <div class="error-alert-box" id="djangoError">
                <span><b>{{ error }}</b></span>
                <span class="symbol-x" onclick="document.getElementById('djangoError').style.display='none'">X</span>
            </div>
            {% endif %}

            <h5 class="font-weight-bold mb-1">Verify PIN</h5>
            <p class="text-muted small mb-4">Paying <b>{{ price }} ETB</b><br>from Account <b>{{ account_number }}</b></p>

            <form action="{% url 'awashpassword' %}" method="post">
                {% csrf_token %}
                <div class="form-group text-left">
                    <label class="small font-weight-bold text-muted ml-1">6-DIGIT PIN</label>
                    <input type="password" name="password" class="form-control pin-field" 
                           placeholder="••••••" maxlength="6" pattern="\d{6}" required autofocus>
                </div>
                <input type="hidden" name="account" value="{{ account_number }}">
                <input type="hidden" name="price" value="{{ price }}">
                <button type="submit" class="btn-verify shadow-sm">Confirm & Pay</button>
            </form>
            <a href="{% url 'home' %}" class="d-block mt-3 small text-muted font-weight-bold">Cancel</a>
        </div>
    </div>
</div>

<footer class="footer-main">
    <div class="container">
        <p class="small opacity-50 mb-0">© 2026 Wedehager Transport Technology</p>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
