<!DOCTYPE html>
<html lang="en">
<head>
    <title>M-PESA PIN | Wedehager</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/styles/bootstrap4/bootstrap.min.css">

    <style>
        /* [Common Styles from safaricom.html above are reused here] */
        :root {
            --brand-navy: #00264d;
            --brand-gold: #ffcc00;
            --brand-dark: #0f172a;
            --safari-green: #00b050;
            --safari-red: #e52d27;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; margin: 0; }
        .top-bar { background: var(--brand-dark); color: white; padding: 8px 0; font-size: 13px; }
        .top-bar a { color: var(--brand-gold); font-weight: 700; text-decoration: none; }
        .navbar-main { background: #ffffff; padding: 10px 0; border-bottom: 5px solid var(--brand-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        .brand-area { display: flex; align-items: center; text-decoration: none !important; }
        .brand-logo { height: 70px !important; width: auto; border-radius: 12px; margin-right: 20px; border: 4px solid var(--brand-navy) !important; }
        .brand-text { font-weight: 800; color: var(--brand-navy); font-size: 28px; text-transform: uppercase; line-height: 0.8; }
        .brand-tagline { color: var(--brand-gold); font-weight: 800; font-size: 10px; letter-spacing: 2px; display: block; margin-top: 5px; }
        .nav-link { color: var(--brand-navy) !important; font-weight: 700; text-transform: uppercase; }

        .payment-card { background: white; border-radius: 15px; border-top: 6px solid var(--safari-green); box-shadow: 0 20px 40px rgba(0,0,0,0.1); margin-top: 50px; overflow: hidden; }
        .btn-safari { background: var(--safari-green); color: white !important; font-weight: 800; padding: 14px; border-radius: 50px; border: none; width: 100%; transition: 0.3s; }
        .btn-safari:hover { background: var(--safari-red); transform: translateY(-2px); }

        .pin-input { font-size: 24px; letter-spacing: 12px; height: 60px; text-align: center; font-weight: bold; border: 2px solid #ddd; border-radius: 10px; }
        .pin-input:focus { border-color: var(--safari-green); box-shadow: none; }
        .footer-main { background: var(--brand-navy); color: white; padding: 40px 0; margin-top: 80px; text-align: center; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="container d-flex justify-content-between align-items-center">
        <span><i class="fas fa-bus mr-2"></i> Ethiopian National Transport Standards</span>
        <a href="{% url 'login' %}"><i class="fas fa-lock mr-1"></i> STAFF LOGIN</a>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-light navbar-main">
    <div class="container">
        <a href="{% url 'home' %}" class="brand-area">
            <img src="../static/images/photo_2026-01-31_09-14-55.jpg" class="brand-logo">
            <div><span class="brand-text">Wedehager</span><span class="brand-tagline">TRANSPORT TECHNOLOGY</span></div>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto align-items-center">
                <li class="nav-item mx-2"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
		 <li class="nav-item mx-2"><a class="nav-link" href="{% url 'get_ticket' %}">My Ticket</a></li>
 <li class="nav-item mx-2"><a class="nav-link" href="{% url 'comment' %}">Feedback</a></li>
 <li class="nav-item mx-2"><a class="nav-link" href="{% url 'about' %}">About Us</a></li>
                <li class="nav-item ml-lg-3"><a href="{% url 'book' %}" class="btn" style="background:var(--brand-gold); color:var(--brand-navy); font-weight:800; padding:10px 20px; border-radius:8px;">BOOK NOW</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="payment-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <img src="../static/images/safari.svg" width="140">
                    <h5 class="mt-4 font-weight-bold">M-PESA Secure PIN</h5>
                    <p class="text-muted small">Paying for Ticket: <b>{{ price }} ETB</b></p>
                </div>

                <form action="{% url 'safaripassword' %}" method="post">
                    {% csrf_token %}
                    <div class="form-group mb-4">
                        <label class="small font-weight-bold text-muted d-block text-center mb-3">ENTER YOUR 4-6 DIGIT PIN</label>
                        <input type="password" id="mpesa_pin" name="password" class="form-control pin-input" maxlength="6" placeholder="••••••" required>
                    </div>

                    <input type="hidden" name="phone" value="{{ phone_number }}">
                    <input type="hidden" name="price" value="{{ price }}">

                    {% if error %}
                    <div class="alert alert-danger py-2 small text-center"><i class="fas fa-times-circle mr-1"></i> {{ error }}</div>
                    {% endif %}

                    <button type="submit" class="btn btn-safari mt-2">CONFIRM PAYMENT</button>
                    
                    <div class="text-center mt-3">
                        <button type="button" class="btn btn-link btn-sm text-muted" onclick="togglePin()">
                            <i id="eyeIcon" class="fas fa-eye mr-1"></i> Show PIN
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="footer-main">
    <div class="container"><p>© 2026 Wedehager • National Travel Solutions</p></div>
</footer>

<script>
    function togglePin() {
        const pin = document.getElementById('mpesa_pin');
        const icon = document.getElementById('eyeIcon');
        if (pin.type === "password") {
            pin.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            pin.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
