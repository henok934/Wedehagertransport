        font-size: 1.5rem;
        font-weight: 800;
        color: #1a2a6c; /* Navy */
        margin: 0;
    }

    .status-indicator {
        font-size: 0.65rem;
        font-weight: 800;
        color: #64748b;
        background: #fff;
        padding: 6px 12px;
        border-radius: 20px;
        letter-spacing: 1px;
    }

    .dot.pulse {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: #10b981;
        border-radius: 50%;
        margin-right: 5px;
        animation: pulse-animation 2s infinite;
    }

    /* 3. International Search Bar */
    .search-section {
        background: #ffffff;
        padding: 25px;
        border-radius: 12px;
        border-bottom: 4px solid #f39c12;
    }

    .search-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        align-items: flex-end;
    }

    /* Reuse the Minimal Input Style */
    .minimal-box {
        display: flex;
        flex-direction: column;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 5px;
    }

    .minimal-box label {
        font-size: 0.65rem;
        font-weight: 800;
        color: #94a3b8;
        margin-bottom: 2px;
        letter-spacing: 1px;
    }

    .minimal-box input {
        border: none;
        outline: none;
        font-weight: 600;
        color: #1a2a6c;
        font-size: 1rem;
    }

    /* 4. The International Action Button */
    .btn-transit-search {
        width: 100%;
        background: #1a2a6c;
        color: white;
        border: none;
        padding: 12px;
        font-weight: 800;
        font-size: 0.8rem;
        letter-spacing: 1px;
        border-radius: 6px;
        text-transform: uppercase;
        transition: 0.3s;
    }

    .btn-transit-search:hover {
        background: #f39c12;
        color: #1a2a6c;
    }

    @keyframes pulse-animation {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* Mobile Responsive Fixes */
    @media (max-width: 768px) {
        .profile-header { text-align: center; justify-content: center; }
        .user-brand { flex-direction: column; }
        .profile-img { margin-right: 0; margin-bottom: 10px; }
        .search-grid { grid-template-columns: 1fr; }
    }
</style>
