<!DOCTYPE html>
<html lang="en">
<head>
    <title>Wedehager | Check Route</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
.intl-error-toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ffffff;
    padding: 15px 20px;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    border-left: 5px solid #ff4b2b; /* Alert Red */
    z-index: 10000;
    min-width: 320px;
    animation: slideIn 0.4s ease-out;
    font-family: 'Segoe UI', sans-serif;
}

.toast-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.toast-icon { color: #ff4b2b; font-size: 20px; }

.toast-message { display: flex; flex-direction: column; }

.toast-title { font-weight: bold; font-size: 14px; color: #333; }

.toast-desc { font-size: 13px; color: #666; }

.toast-close {
    background: none; border: none; color: #999;
    cursor: pointer; margin-left: auto; transition: 0.2s;
}

.toast-close:hover { color: #333; }

/* The 5-second countdown bar */
.toast-progress {
    position: absolute; bottom: 0; left: 0;
    height: 3px; width: 100%; background: #eee;
}

.toast-progress::after {
    content: ''; position: absolute; left: 0;
    width: 100%; height: 100%; background: #ff4b2b;
    animation: progressFill 5s linear forwards;
}

@keyframes slideIn {
    from { transform: translateX(110%); }
    to { transform: translateX(0); }
}

@keyframes progressFill {
    from { width: 100%; }
    to { width: 0%; }
}

        :root { --brand-navy: #00264d; --brand-gold: #ffcc00; --brand-dark: #0f172a; --surface-gray: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--surface-gray); margin: 0; }
        
        /* Navigation & Header */
        .top-bar { background: var(--brand-dark); color: white; padding: 8px 0; font-size: 13px; }
        .navbar-main { background: #ffffff; padding: 12px 0; border-bottom: 5px solid var(--brand-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        .brand-text { font-weight: 800; color: var(--brand-navy); font-size: 20px; text-transform: uppercase; line-height: 1; display: block; }
        .brand-tagline { color: var(--brand-gold); font-weight: 800; font-size: 9px; letter-spacing: 1px; display: block; }
        .custom-nav-select { border: 2px solid #e2e8f0; font-size: 11px; font-weight: 800; border-radius: 8px; height: 38px; min-width: 140px; color: var(--brand-navy); text-transform: uppercase; margin: 3px; cursor: pointer; }

        /* Page Layout */
        .page-container { max-width: 900px; margin: 40px auto; padding: 0 15px; }
        .content-card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 25px; border-top: 5px solid var(--brand-navy); margin-bottom: 30px; }

        /* Table Styling */
        .styled-table { width: 100%; border-collapse: collapse; }
        .styled-table th { background-color: #4CAF50; color: white; padding: 10px; font-size: 12px; text-transform: uppercase; }
        .styled-table td { padding: 10px; border-bottom: 1px solid #edf2f7; font-size: 12px; color: #334155; font-weight: 600; }
        .styled-table tr:nth-child(even) { background-color: #f9f9f9; }

        /* Footer */
        .footer-main { background: var(--brand-navy); color: rgba(255,255,255,0.8); padding: 40px 0 20px; margin-top: 60px; border-top: 5px solid var(--brand-gold); }
        .footer-bottom { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; margin-top: 30px; font-size: 11px; text-align: center; }

        @media (max-width: 1200px) { .custom-nav-select { width: 100%; margin: 5px 0; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="container d-flex justify-content-between align-items-center">
        <span><i class="fas fa-headset mr-2"></i> Support: <b>+251975143134</b></span>
        <a href="{% url 'logout' %}" class="text-danger font-weight-bold small text-decoration-none"><i class="fas fa-power-off mr-1"></i> LOGOUT</a>
    </div>
</div>
{% if error %}
<div class="intl-error-toast" id="djangoError">
    <div class="toast-content">
        <div class="toast-icon"><i class="fas fa-circle-exclamation"></i></div>
        <div class="toast-message">
            <span class="toast-title">System Message</span>
            <span class="toast-desc">{{ error }}</span>
        </div>
        <button class="toast-close" onclick="closeError()"><i class="fas fa-times"></i></button>
    </div>
    <div class="toast-progress"></div>
</div>
{% endif %}

<script>
function closeError() {
    const toast = document.getElementById('djangoError');
    if (toast) {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(20px)';
        toast.style.transition = '0.4s ease';
        setTimeout(() => toast.remove(), 400);
    }
}

// Auto-hide after 5 seconds
document.addEventListener('DOMContentLoaded', () => {
    if (document.getElementById('djangoError')) {
        setTimeout(closeError, 5000);
    }
});
</script>

<div class="page-container">
    <div class="content-card" style="max-width: 500px; margin: 0 auto 30px;">
        <h4 class="text-center font-weight-bold mb-4" style="color: var(--brand-navy);">Ticket Inquiry</h4>
        <form action="{% url 'delete_ticket' %}" method="post">
            {% csrf_token %}
            
            <div style="display: flex; align-items: center; margin: 5px 0;">
                <label for="depcity" style="color: #003366; font-weight: bold; margin-right: 10px; margin-left: 50px;">
                    <b>From:</b>
                </label>
                <select name="depcity" id="depcity" class="form-control" style="width: 160px; height: 45px; color: brown; text-align: left; margin-left: 10px;" required>
                    <option value="" style="color: green; font-weight: bold;">Select</option>
                    {% if des %}
                        {% for depcity in des %}
                            {% if depcity.depcity not in "Kality,Autobustera,Lamberet,Ayertena,Asko" %}
                                <option value="{{ depcity.depcity }}" style="color: blue; font-weight: bold;">{{ depcity.depcity }}</option>
                            {% endif %}
                        {% endfor %}
                    {% endif %}
                </select>
            </div>

            <div style="display: flex; align-items: center; margin: 5px 0; margin-top: 20px;">
                <label for="descity" style="color: #003366; font-weight: bold; margin-right: 10px; margin-left: 50px;">
                    <b>To:</b>
                </label>
                <select name="descity" id="descity" class="form-control" style="width: 160px; height: 45px; color: brown; text-align: left; margin-left: 30px;" required>
                    <option value="" style="color: green; font-weight: bold;">Select</option>
                    {% if des %}
                        {% for depcity in des %}
                            {% if depcity.depcity not in "Kality,Autobustera,Lamberet,Ayertena,Asko" %}
                                <option value="{{ depcity.depcity }}" style="color: blue; font-weight: bold;">{{ depcity.depcity }}</option>
                            {% endif %}
                        {% endfor %}
                    {% endif %}
                </select>
            </div>

            <div style="display: flex; align-items: center; margin: 5px 0; margin-top:20px;">
                <label for="date" style="color: #003366; font-weight: bold; margin-right: 10px;margin-left:50px;"><b>Date:</b></label>
                <input type="date" name="date" id="date" class="form-control" style="width: 160px; height: 45px; margin-left:15px; color: brown;" required>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary px-5" style="background-color: var(--brand-navy); border: none;">Search Ticket</button>
            </div>
        </form>
    </div>
</div>

            <div class="col-md-6 text-md-right"><p class="small">Support: +251 975 143 134</p></div>
        </div>

    </div>
</footer>
